framework:
    trusted_proxies: '0.0.0.0/0'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']
    session:
        handler_id: null
        save_path: '%kernel.project_dir%/var/cache/sessions'
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax
