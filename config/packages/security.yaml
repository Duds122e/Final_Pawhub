security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\UserProvider
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|css|image|js)/
            security: false

        api_platform:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~


        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\LoginAuthenticator
                - App\Security\GoogleAuthenticator
            entry_point: App\Security\LoginAuthenticator
            logout:
                path: app_logout
                target: app_login  # Redirect to login page after logout

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /
                # by default, the feature is enabled by checking a checkbox in the
                # login form, uncomment the following line to always enable it.
                #always_remember_me: true

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        # Public routes - must come first
        - { path: ^/$, roles: PUBLIC_ACCESS }  # Root path
        - { path: ^/home, roles: PUBLIC_ACCESS }  # Home path
        - { path: ^/about, roles: PUBLIC_ACCESS }  # About page
        - { path: ^/services, roles: PUBLIC_ACCESS }  # Services landing page
        - { path: ^/contact, roles: PUBLIC_ACCESS }  # Contact page
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/resetting, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }  # Allow logout for all
        - { path: ^/public, roles: PUBLIC_ACCESS }
        - { path: ^/css/, roles: PUBLIC_ACCESS }
        - { path: ^/js/, roles: PUBLIC_ACCESS }
        - { path: ^/images/, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs$, roles: PUBLIC_ACCESS }  # API documentation
        - { path: ^/api/docs.json$, roles: PUBLIC_ACCESS }  # API docs JSON
        - { path: ^/api/login, roles: PUBLIC_ACCESS }  # API login endpoint
        - { path: ^/api/register, roles: PUBLIC_ACCESS }  # API registration endpoint
        - { path: ^/api/catalog, roles: PUBLIC_ACCESS }  # Simple JSON catalog for mobile
        - { path: ^/health\.php$, roles: PUBLIC_ACCESS }
        - { path: ^/diag\.php$, roles: PUBLIC_ACCESS }
        
        # Admin-only pages
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_ADMIN }
        - { path: ^/log, roles: ROLE_ADMIN }
        
        # Authenticated user routes
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/pet, roles: ROLE_USER }
        - { path: ^/service, roles: ROLE_USER }
        - { path: ^/appointment, roles: ROLE_USER }
        - { path: ^/adoption, roles: ROLE_USER }
        
        # Default - require authentication for all other routes
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
